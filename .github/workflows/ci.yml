name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Annule les runs précédents encore en cours sur la même branche/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      # Source unique de vérité : la version Flutter est lue depuis .fvmrc
      # (le même fichier que FVM utilise en local). Pas besoin d'installer FVM
      # sur le runner — on passe juste la version à l'action Flutter.
      - name: Read Flutter version from .fvmrc
        id: fvm
        run: echo "version=$(jq -r .flutter .fvmrc)" >> "$GITHUB_OUTPUT"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ steps.fvm.outputs.version }}
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (lint)
        run: flutter analyze

      - name: Run tests
        run: flutter test
