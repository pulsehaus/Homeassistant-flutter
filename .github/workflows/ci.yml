name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Annule les runs précédents encore en cours sur la même branche/PR
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Version Flutter épinglée pour des résultats reproductibles.
      # À garder en phase avec la version FVM du projet (.fvmrc).
      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.6
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Verify formatting
        run: dart format --output=none --set-exit-if-changed .

      - name: Analyze (lint)
        run: flutter analyze

      - name: Run tests
        run: flutter test
